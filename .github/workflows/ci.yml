name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    name: Fast repository gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14
      - name: Restore Bun and Turbo caches
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-turbo-${{ hashFiles('bun.lock', 'turbo.json', '**/turbo.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-turbo-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run fast repository gate
        run: bun run ci
        env:
          TURBO_TEAM: team_UNQzjxlqcykMPTv2liMAAqCJ
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14
      - name: Restore Bun and Turbo caches
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-turbo-${{ hashFiles('bun.lock', 'turbo.json', '**/turbo.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-turbo-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run integration tests
        run: bun run test:integration
        env:
          TURBO_TEAM: team_UNQzjxlqcykMPTv2liMAAqCJ
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  e2e:
    name: CLI and daemon E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14
      - name: Restore Bun and Turbo caches
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-turbo-${{ hashFiles('bun.lock', 'turbo.json', '**/turbo.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-turbo-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run CLI and daemon E2E tests
        run: bun run test:e2e
        env:
          TURBO_TEAM: team_UNQzjxlqcykMPTv2liMAAqCJ
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
