name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14
      - name: Add local binaries to PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> "$GITHUB_PATH"
      - name: install
        run: bun install --frozen-lockfile
      - name: lint
        run: biome check .
      - name: typecheck
        run: tsgo --noEmit -p tsconfig.base.json
      - name: build
        run: bun run build
      - name: package-dependencies
        run: bun run scripts/verify/package-dependencies.ts
      - name: architecture-lint
        run: bun run scripts/verify/architecture-lint.ts
      - name: cli-no-business-logic
        run: bun run scripts/verify/cli-no-business-logic.ts
      - name: cli-framework-citty
        run: bun run scripts/verify/cli-framework-citty.ts
      - name: cli-command-drift
        run: bun run scripts/verify/cli-command-drift.ts
      - name: cli-thin-lines
        run: bun run scripts/verify/cli-thin-lines.ts
      - name: cli-reference
        run: bun run check:cli-reference
      - name: exports-map
        run: bun run scripts/verify/exports-map.ts
      - name: full-test-suite
        run: bash scripts/verify/full-test-suite.sh
